name: Build APK V2 (Gradle 7.5 Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Hapus file lama & ekstrak ZIP
      run: |
        rm -rf app/ build.gradle settings.gradle gradle.properties gradle/ gradlew
        if [ -f "RIDZSENSIX_V2_FULL.zip" ]; then
          unzip -o RIDZSENSIX_V2_FULL.zip -d extracted/
        else
          echo "❌ ZIP tidak ditemukan!"
          exit 1
        fi
        APP_DIR=$(find extracted -name "app" -type d | head -1)
        if [ -n "$APP_DIR" ]; then
          PROJECT_DIR=$(dirname "$APP_DIR")
          cp -r "$PROJECT_DIR"/* ./
        else
          cp -r extracted/* ./
        fi
        rm -rf extracted
        rm -rf gradlew gradle/wrapper
        ls -la

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download & Install Gradle 7.5
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -d /opt/gradle gradle-7.5-bin.zip
        export PATH=/opt/gradle/gradle-7.5/bin:$PATH
        echo "GRADLE_HOME=/opt/gradle/gradle-7.5" >> $GITHUB_ENV
        echo "/opt/gradle/gradle-7.5/bin" >> $GITHUB_PATH
        /opt/gradle/gradle-7.5/bin/gradle --version

    - name: Build APK (pakai Gradle 7.5)
      run: |
        /opt/gradle/gradle-7.5/bin/gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
