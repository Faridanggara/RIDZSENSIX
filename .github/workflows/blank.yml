name: Auto Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract and find project
      run: |
        # Jika ada ZIP, ekstrak
        if [ -f "RIDZSENSIX.zip" ]; then
          unzip RIDZSENSIX.zip
        fi

        # Cari folder yang berisi app/
        APP_PATH=$(find . -name "app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "Menemukan app di: $APP_PATH"
          # Pindahkan semua file ke root
          PROJECT_DIR=$(dirname $APP_PATH)
          cp -r $PROJECT_DIR/* ./
        fi

        echo "📂 Struktur root:"
        ls -la

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          sudo apt update && sudo apt install gradle -y
          gradle assembleDebug --no-daemon
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
