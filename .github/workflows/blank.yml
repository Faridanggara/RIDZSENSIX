name: Build APK V2 FULL (Force Gradle 7.5)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Hapus semua file lama & ekstrak ZIP
      run: |
        rm -rf app/ build.gradle settings.gradle gradle.properties gradle/ gradlew
        if [ -f "RIDZSENSIX_V2_FULL.zip" ]; then
          unzip -o RIDZSENSIX_V2_FULL.zip -d extracted/
        else
          echo "❌ ZIP tidak ditemukan!"
          exit 1
        fi
        APP_DIR=$(find extracted -name "app" -type d | head -1)
        if [ -n "$APP_DIR" ]; then
          PROJECT_DIR=$(dirname "$APP_DIR")
          cp -r "$PROJECT_DIR"/* ./
        else
          cp -r extracted/* ./
        fi
        rm -rf extracted
        # Hapus wrapper agar tidak dipakai
        rm -rf gradlew gradle/wrapper
        echo "📂 Struktur root:"
        ls -la

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Gradle 7.5 (pastikan)
      run: |
        sudo apt update
        sudo apt install gradle -y
        # Cek versi yang terinstall
        gradle --version

    - name: Build APK (paksa pakai gradle 7.5)
      run: |
        # Pastikan gradle yang dipakai adalah yang di /usr/bin/gradle
        export PATH=/usr/bin:$PATH
        gradle --version
        gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
