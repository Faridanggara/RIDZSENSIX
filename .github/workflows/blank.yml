name: Build APK V2 FULL (Force)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Ekstrak ZIP V2 FULL
      run: |
        rm -rf app/ build.gradle settings.gradle gradle.properties gradle/ gradlew
        ZIP_FILE="RIDZSENSIX_V2_FULL.zip"
        if [ ! -f "$ZIP_FILE" ]; then
          echo "❌ $ZIP_FILE tidak ditemukan!"
          echo "📂 Daftar file yang ada:"
          ls -la
          exit 1
        fi
        echo "✅ Menggunakan: $ZIP_FILE"
        unzip -o "$ZIP_FILE" -d extracted/
        APP_DIR=$(find extracted -name "app" -type d | head -1)
        if [ -n "$APP_DIR" ]; then
          PROJECT_DIR=$(dirname "$APP_DIR")
          cp -r "$PROJECT_DIR"/* ./
        else
          cp -r extracted/* ./
        fi
        rm -rf extracted
        echo "📂 Struktur root:"
        ls -la

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download Gradle 7.5
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -d /opt/gradle gradle-7.5-bin.zip
        export PATH=/opt/gradle/gradle-7.5/bin:$PATH
        /opt/gradle/gradle-7.5/bin/gradle --version

    - name: Build APK
      run: |
        /opt/gradle/gradle-7.5/bin/gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apkp
