name: Build APK Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract ZIP
      run: |
        for f in *.zip; do
          if [ -f "$f" ]; then
            unzip -o "$f" -d extracted/
          fi
        done
        APP_DIR=$(find extracted -name "app" -type d | head -1)
        if [ -n "$APP_DIR" ]; then
          PROJECT_DIR=$(dirname "$APP_DIR")
          cp -r "$PROJECT_DIR"/* ./
        else
          cp -r extracted/* ./
        fi
        rm -rf extracted
        ls -la

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Gradle 7.5 (PAKSA)
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip gradle-7.5-bin.zip -d /opt/gradle
        export PATH=/opt/gradle/gradle-7.5/bin:$PATH
        echo "GRADLE_HOME=/opt/gradle/gradle-7.5" >> $GITHUB_ENV
        echo "/opt/gradle/gradle-7.5/bin" >> $GITHUB_PATH
        gradle --version

    - name: Build APK
      run: |
        export PATH=/opt/gradle/gradle-7.5/bin:$PATH
        gradle assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
