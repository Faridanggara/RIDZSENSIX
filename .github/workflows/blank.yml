name: Build APK with Debug

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract ZIP
      run: |
        for f in *.zip; do
          if [ -f "$f" ]; then
            echo "📦 Mengekstrak $f"
            unzip -o "$f" -d extracted/
          fi
        done
        APP_DIR=$(find extracted -name "app" -type d | head -1)
        if [ -n "$APP_DIR" ]; then
          PROJECT_DIR=$(dirname "$APP_DIR")
          echo "✅ Menemukan app di: $APP_DIR"
          cp -r "$PROJECT_DIR"/* ./
        else
          echo "⚠️ Folder app tidak ditemukan, copy semua"
          cp -r extracted/* ./
        fi
        rm -rf extracted
        echo "📂 Struktur root:"
        ls -la

    - name: Show build.gradle (app)
      run: |
        echo "📄 Isi app/build.gradle:"
        cat app/build.gradle || echo "app/build.gradle TIDAK ADA!"

    - name: Show settings.gradle
      run: |
        echo "📄 Isi settings.gradle:"
        cat settings.gradle || echo "settings.gradle TIDAK ADA!"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK (with stacktrace)
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        else
          sudo apt update && sudo apt install gradle -y
          gradle assembleDebug --no-daemon --stacktrace
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
