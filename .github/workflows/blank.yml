name: Build APK V2 FULL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Hapus file lama & ekstrak ZIP baru
      run: |
        rm -rf app/ build.gradle settings.gradle gradle.properties gradle/ gradlew
        if [ -f "RIDZSENSIX_V2_FULL.zip" ]; then
          unzip -o RIDZSENSIX_V2_FULL.zip
          echo "✅ Menggunakan RIDZSENSIX_V2_FULL.zip"
        else
          echo "❌ RIDZSENSIX_V2_FULL.zip tidak ditemukan!"
          exit 1
        fi
        ls -la

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK (clean)
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
