name: Build APK (Stacktrace)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Ekstrak ZIP & paksa gradle.properties
      run: |
        rm -rf app/ build.gradle settings.gradle gradle.properties gradle/ gradlew
        ZIP_FILE=$(ls *.zip 2>/dev/null | head -1)
        if [ -z "$ZIP_FILE" ]; then echo "❌ Tidak ada ZIP!"; exit 1; fi
        echo "✅ Menggunakan: $ZIP_FILE"
        unzip -o "$ZIP_FILE" -d extracted/
        APP_DIR=$(find extracted -name "app" -type d | head -1)
        if [ -n "$APP_DIR" ]; then
          PROJECT_DIR=$(dirname "$APP_DIR")
          cp -r "$PROJECT_DIR"/* ./
        else
          cp -r extracted/* ./
        fi
        rm -rf extracted
        echo "org.gradle.jvmargs=-Xmx1024m" > gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        cat gradle.properties
        ls -la

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download Gradle 7.5
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -d /opt/gradle gradle-7.5-bin.zip

    - name: Build APK (with stacktrace)
      run: |
        /opt/gradle/gradle-7.5/bin/gradle assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
