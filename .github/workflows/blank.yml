name: Build APK V2 FULL (Gradle Global)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Hapus file lama & ekstrak ZIP
      run: |
        rm -rf app/ build.gradle settings.gradle gradle.properties gradle/ gradlew
        if [ -f "RIDZSENSIX_V2_FULL.zip" ]; then
          unzip -o RIDZSENSIX_V2_FULL.zip -d extracted/
        else
          echo "❌ ZIP RIDZSENSIX_V2_FULL.zip tidak ditemukan!"
          exit 1
        fi
        # Cari folder yang mengandung app/ dan pindahkan ke root
        APP_DIR=$(find extracted -name "app" -type d | head -1)
        if [ -n "$APP_DIR" ]; then
          PROJECT_DIR=$(dirname "$APP_DIR")
          echo "✅ Menemukan proyek di: $PROJECT_DIR"
          cp -r "$PROJECT_DIR"/* ./
        else
          echo "⚠️ Folder app tidak ditemukan, copy semua file extracted"
          cp -r extracted/* ./
        fi
        rm -rf extracted
        echo "📂 Struktur root setelah ekstrak:"
        ls -la

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Gradle
      run: |
        sudo apt update
        sudo apt install gradle -y
        gradle --version

    - name: Build APK (pakai Gradle global)
      run: gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
